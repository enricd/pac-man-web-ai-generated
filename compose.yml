services:
  web:
    image: ghcr.io/${GITHUB_REPOSITORY}:${TAG:-latest}
    restart: always
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.services.${STACK_NAME:-pacman}-web.loadbalancer.server.port=80
      # HTTP router (redirects to HTTPS)
      - traefik.http.routers.${STACK_NAME:-pacman}-web-http.rule=Host(`${APP_DOMAIN}`) && !PathPrefix(`/api`)
      - traefik.http.routers.${STACK_NAME:-pacman}-web-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME:-pacman}-web-http.middlewares=https-redirect
      # HTTPS router
      - traefik.http.routers.${STACK_NAME:-pacman}-web-https.rule=Host(`${APP_DOMAIN}`) && !PathPrefix(`/api`)
      - traefik.http.routers.${STACK_NAME:-pacman}-web-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME:-pacman}-web-https.tls=true
      - traefik.http.routers.${STACK_NAME:-pacman}-web-https.tls.certresolver=le
    networks:
      - traefik-public

  api:
    image: ghcr.io/${GITHUB_REPOSITORY}-api:${TAG:-latest}
    restart: always
    volumes:
      - leaderboard-data:/app/data
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.services.${STACK_NAME:-pacman}-api.loadbalancer.server.port=8000
      # HTTP router (redirects to HTTPS)
      - traefik.http.routers.${STACK_NAME:-pacman}-api-http.rule=Host(`${APP_DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.${STACK_NAME:-pacman}-api-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME:-pacman}-api-http.middlewares=https-redirect
      # HTTPS router
      - traefik.http.routers.${STACK_NAME:-pacman}-api-https.rule=Host(`${APP_DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.${STACK_NAME:-pacman}-api-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME:-pacman}-api-https.tls=true
      - traefik.http.routers.${STACK_NAME:-pacman}-api-https.tls.certresolver=le
      # Rate limiting middleware
      - traefik.http.middlewares.${STACK_NAME:-pacman}-api-ratelimit.ratelimit.average=100
      - traefik.http.middlewares.${STACK_NAME:-pacman}-api-ratelimit.ratelimit.burst=50
      - traefik.http.routers.${STACK_NAME:-pacman}-api-https.middlewares=${STACK_NAME:-pacman}-api-ratelimit
    networks:
      - traefik-public

volumes:
  leaderboard-data:

networks:
  traefik-public:
    external: true
