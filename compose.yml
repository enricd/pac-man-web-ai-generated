services:
  web:
    image: ghcr.io/${GITHUB_REPOSITORY}:${TAG:-latest}
    restart: always
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.services.${STACK_NAME:-pacman}-web.loadbalancer.server.port=80
      # HTTP router (redirects to HTTPS)
      - traefik.http.routers.${STACK_NAME:-pacman}-web-http.rule=Host(`${APP_DOMAIN}`)
      - traefik.http.routers.${STACK_NAME:-pacman}-web-http.entrypoints=http
      - traefik.http.routers.${STACK_NAME:-pacman}-web-http.middlewares=https-redirect
      # HTTPS router
      - traefik.http.routers.${STACK_NAME:-pacman}-web-https.rule=Host(`${APP_DOMAIN}`)
      - traefik.http.routers.${STACK_NAME:-pacman}-web-https.entrypoints=https
      - traefik.http.routers.${STACK_NAME:-pacman}-web-https.tls=true
      - traefik.http.routers.${STACK_NAME:-pacman}-web-https.tls.certresolver=le
    networks:
      - traefik-public

networks:
  traefik-public:
    external: true
