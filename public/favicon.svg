<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="10" fill="#0a0a0a"/>
  <defs>
    <clipPath id="mouth">
      <!-- Full area minus a triangle wedge for the mouth -->
      <path d="M0 0 H64 V64 H0 Z M30 32 L52 20 L52 44 Z" clip-rule="evenodd"/>
    </clipPath>
  </defs>
  <!-- Pac-Man body -->
  <circle cx="30" cy="32" r="18" fill="#00b4ff" clip-path="url(#mouth)"/>
  <!-- Eye -->
  <circle cx="28" cy="23" r="3" fill="#0a0a0a"/>
  <!-- Pellet -->
  <circle cx="54" cy="32" r="3" fill="#00b4ff"/>
</svg>
